<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Coding App Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Vibe Coding App Generator</h1>
        <p class="subtitle">Enter your work experience below and we'll suggest 3 app ideas you can build together using vibe coding.</p>

        <div class="input-row">
            <div class="user-input">
                <label for="euty-input">Euty's Experience</label>
                <textarea id="euty-input" rows="6" placeholder="Describe your work experience, skills, and interests...">25 years private equity and global listed markets investing</textarea>
            </div>
            <div class="user-input">
                <label for="simon-input">Simon's Experience</label>
                <textarea id="simon-input" rows="6" placeholder="Describe your work experience, skills, and interests...">20 years private equity experience. 5 years AI coding, research and development</textarea>
            </div>
        </div>

        <button id="suggest-btn">Suggest App Ideas</button>
        <div id="error-msg" class="error-msg"></div>
        <div id="results"></div>
    </div>

    <script>
        const eutyInput = document.getElementById('euty-input');
        const simonInput = document.getElementById('simon-input');
        const btn = document.getElementById('suggest-btn');
        const errorMsg = document.getElementById('error-msg');
        const results = document.getElementById('results');

        function updateButton() {
            btn.disabled = !(eutyInput.value.trim() && simonInput.value.trim());
        }

        eutyInput.addEventListener('input', updateButton);
        simonInput.addEventListener('input', updateButton);

        btn.addEventListener('click', async () => {
            btn.disabled = true;
            btn.textContent = 'Generating...';
            errorMsg.textContent = '';
            results.innerHTML = '';

            try {
                const response = await fetch('/suggest-apps', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        euty_experience: eutyInput.value.trim(),
                        simon_experience: simonInput.value.trim()
                    })
                });
                const data = await response.json();

                if (data.error) {
                    errorMsg.textContent = data.error;
                } else {
                    data.suggestions.forEach(s => {
                        const card = document.createElement('div');
                        card.className = 'suggestion-card';
                        card.innerHTML = '<h3>' + escapeHtml(s.title) + '</h3><p>' + escapeHtml(s.description) + '</p>';
                        results.appendChild(card);
                    });
                }
            } catch (err) {
                errorMsg.textContent = 'Something went wrong. Please try again.';
            } finally {
                btn.textContent = 'Suggest App Ideas';
                updateButton();
            }
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
